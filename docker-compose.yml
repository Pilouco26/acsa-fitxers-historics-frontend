services:
  web:
    build:
      context: .
      args:
        VITE_API_URL: /api
        VITE_API_KEY: ${VITE_API_KEY:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://api:8000}
      API_KEY: ${API_KEY:-${VITE_API_KEY:-}}
    networks:
      - default
      - acsa
    restart: unless-stopped

networks:
  acsa:
    external: true
