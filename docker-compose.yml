services:
  web:
    build:
      context: .
      args:
        VITE_API_URL: /api
        VITE_API_KEY: ${VITE_API_KEY:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
