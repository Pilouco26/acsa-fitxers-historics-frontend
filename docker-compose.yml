services:
  web:
    build:
      context: .
      args:
        VITE_API_URL: /api
        VITE_API_KEY: ${VITE_API_KEY:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      # When running alongside the backend in the same Compose project/network,
      # use the backend service DNS name.
      API_UPSTREAM: ${API_UPSTREAM:-http://api:8000}
    restart: unless-stopped
